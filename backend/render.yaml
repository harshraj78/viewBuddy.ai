services:
  - type: web
    name: viewbuddy-ai-backend
    env: docker
    plan: free
    healthCheckPath: /api/v1/health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
